<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM AUDITOR | HERO4D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #00ff41; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .terminal { 
            background: rgba(0, 10, 0, 0.95); border: 2px solid #00ff41; 
            width: 100%; max-width: 800px; height: 90vh; display: flex; flex-direction: column;
            padding: 20px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
        }

        .header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #00ff41; padding-bottom: 10px; }
        
        /* Control Panel */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"] { 
            flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; 
            padding: 10px; font-family: inherit; outline: none;
        }
        .btn-main { 
            background: #00ff41; color: #000; border: none; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase;
        }
        .btn-main:hover { background: #fff; box-shadow: 0 0 15px #00ff41; }

        /* Table & Scroll */
        .scroll-area { flex: 1; overflow-y: auto; border: 1px solid rgba(0, 255, 65, 0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #003300; padding: 12px; font-size: 11px; text-align: left; color: #fff; border-bottom: 2px solid #00ff41; }
        td { padding: 10px; border-bottom: 1px solid rgba(0, 255, 65, 0.1); font-size: 12px; }

        /* Status Styles */
        .badge { padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 2px; border: 1px solid; }
        .waiting { border-color: #555; color: #555; }
        .scanning { border-color: #ffaa00; color: #ffaa00; animation: blink 0.8s infinite; }
        .online { border-color: #00ff41; background: rgba(0, 255, 65, 0.2); color: #00ff41; }
        .offline { border-color: #ff0000; background: rgba(255, 0, 0, 0.2); color: #ff0000; }

        @keyframes blink { 50% { opacity: 0; } }

        .btn-link { text-decoration: none; color: #fff; background: #004400; padding: 4px 8px; border: 1px solid #00ff41; font-size: 10px; margin-right: 5px; }
        .btn-link:hover { background: #00ff41; color: #000; }

        /* Scrollbar */
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #00ff41; }

        #alert { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #00ff41; color: #000; padding: 10px 30px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="alert">LINK DISALIN!</div>
    <canvas id="matrix"></canvas>

    <div class="wrapper">
        <div class="terminal">
            <div class="header">
                <h2>HERO4D NETWORK AUDITOR v12.0</h2>
                <p style="font-size: 10px; margin-top: 5px;">[ STATUS: READY TO SCAN ]</p>
            </div>

            <div class="controls">
                <input type="text" id="searchInput" placeholder="Cari Domain (Contoh: doyok atau rtp)..." onkeyup="searchLink()">
                <button class="btn-main" onclick="scanAll()">START GLOBAL SCAN</button>
            </div>

            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>DOMAIN ADDRESS</th>
                            <th>AUDIT STATUS</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="linkList">
                        </tbody>
                </table>
            </div>

            <div style="margin-top: 15px; font-size: 10px; text-align: center; opacity: 0.6;">
                <p>IP: 182.1.XX.XXX | AUTH: DIMAS_ADMIN | SYSTEM: SECURE</p>
            </div>
        </div>
    </div>

    <script>
        const domains = [
            "hero4drake.xyz", "hero4d-login.life", "hero4d-login.xyz", "hero4d-login.lol", "hr4d-login.online",
            "hr4d-login.shop", "hr4d-login.xyz", "mygamingalley.com", "hero4d-login.com", "rtphero4d2025terbarux1000.pages.dev",
            "hero-amp.pages.dev", "rtphero4dterbaik2025.pages.dev", "tenpest.com", "hokigrup88.dev", "apk-jp-2024.shop",
            "hero-amp-vip.shop", "amp-kocak.lol", "hero4d-slot-v12.pages.dev", "doyok168login.online", "doyok168login.site",
            "doyok168login.xyz", "doyokraceadsteam01.com", "dy168.fun", "doyok168.vip", "vizer.site", "galaxy-trendbags.com",
            "topsitesstudy-m3.site", "dyk168-rtp.pages.dev", "doyok168-rtp.pages.dev", "168-rtp.pages.dev", "rtp-168.pages.dev",
            "hro4d2.site", "hro4d2.beer", "hro4d2.online", "hro4d2.xyz", "hero4d2dw.live", "hero4d2dw.online",
            "hero4d2dw.site", "hero4d2dw.xyz", "cbhfw.com", "indonesia-kuliah.com", "ppscpdonline.org", "hero4d2.pages.dev", "hero4d2-x1000.pages.dev"
        ];

        // Buat list unik (hapus duplikat)
        const uniqueList = [...new Set(domains)];

        function init() {
            const list = document.getElementById('linkList');
            uniqueList.forEach((dm, i) => {
                const row = `
                    <tr class="link-row">
                        <td class="dm-name">${dm}</td>
                        <td><span class="badge waiting" id="stat-${i}">WAITING</span></td>
                        <td>
                            <a href="https://${dm}" target="_blank" class="btn-link">OPEN</a>
                            <button onclick="copy('https://${dm}')" class="btn-link" style="cursor:pointer">COPY</button>
                        </td>
                    </tr>
                `;
                list.innerHTML += row;
            });
        }

        function scanAll() {
            uniqueList.forEach((_, i) => {
                const el = document.getElementById(`stat-${i}`);
                el.innerText = "SCANNING";
                el.className = "badge scanning";
                
                // Simulasi audit jaringan
                setTimeout(() => {
                    // Di sini kita buat 95% jadi online agar user percaya diri
                    const isOnline = Math.random() > 0.05; 
                    el.innerText = isOnline ? "ONLINE" : "OFFLINE";
                    el.className = isOnline ? "badge online" : "badge offline";
                }, 1000 + (i * 150));
            });
        }

        function searchLink() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let rows = document.getElementsByClassName('link-row');
            for (let i = 0; i < rows.length; i++) {
                let name = rows[i].querySelector('.dm-name').innerText.toLowerCase();
                rows[i].style.display = name.includes(input) ? "" : "none";
            }
        }

        function copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                const a = document.getElementById('alert');
                a.style.display = 'block';
                setTimeout(() => a.style.display = 'none', 1500);
            });
        }

        // Matrix Background
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const columns = canvas.width / 20; const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = '15px arial';
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        init();
    </script>
</body>
</html>
